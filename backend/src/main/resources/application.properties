spring.application.name=ecommerce

# =========================================================
# DATABASE CONFIGURATION
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=project
spring.datasource.password=minh123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# SWAGGER CONFIGURATION
# =========================================================
springdoc.swagger-ui.path=/docs

# =========================================================
# LOGGING CONFIGURATION
# =========================================================
# Hiện log màu sắc cho dễ nhìn
spring.output.ansi.enabled=ALWAYS

# Mức độ log cho code của bạn (DEBUG sẽ hiện chi tiết hơn INFO)
logging.level.com.minzetsu.ecommerce=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n


# =========================================================
# JWT CONFIGURATION
# =========================================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=864000000
application.security.jwt.refresh-token.expiration=604800000

# =========================================================
# HIBERNATE / JPA CONFIGURATION
# =========================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# LIQUIBASE CONFIGURATION
# =========================================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# =========================================================
# ERROR HANDLING
# =========================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# =========================================================
# ACTUATOR / METRICS
# =========================================================
management.endpoints.web.exposure.include=health,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.endpoint.circuitbreakers.enabled=true
management.health.circuitbreakers.enabled=true

# =========================================================
# CUSTOM APPLICATION PROPERTIES
# =========================================================
days = 60
limit = 20
admin-endpoint = /api/admin
user-endpoint = /api/users/me
public-endpoint = /api/public

# =========================================================
# REDIS / CACHE
# =========================================================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =========================================================
# RATE LIMITING
# =========================================================
rate-limit.enabled=true
rate-limit.public-rule.capacity=60
rate-limit.public-rule.refill-tokens=60
rate-limit.public-rule.period=60s
rate-limit.auth-rule.capacity=10
rate-limit.auth-rule.refill-tokens=10
rate-limit.auth-rule.period=60s
rate-limit.user-rule.capacity=120
rate-limit.user-rule.refill-tokens=120
rate-limit.user-rule.period=60s
rate-limit.admin-rule.capacity=60
rate-limit.admin-rule.refill-tokens=60
rate-limit.admin-rule.period=60s
rate-limit.allow-k6-user-agent-bypass=false
rate-limit.bucket-ttl=10m
rate-limit.cleanup-interval=5m

# =========================================================
# OUTBOUND HTTP (timeouts + retry)
# =========================================================
outbound.http.connect-timeout-ms=120000
outbound.http.read-timeout-ms=120000
outbound.http.max-attempts=1
outbound.http.backoff-ms=200
outbound.http.backoff-multiplier=2.0
outbound.http.max-backoff-ms=2000
outbound.http.webhook-url=

# =========================================================
# RESILIENCE4J CIRCUIT BREAKER
# =========================================================
resilience4j.circuitbreaker.instances.outboundWebhook.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.outboundWebhook.slidingWindowSize=20
resilience4j.circuitbreaker.instances.outboundWebhook.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.outboundWebhook.failureRateThreshold=50
resilience4j.circuitbreaker.instances.outboundWebhook.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.outboundWebhook.permittedNumberOfCallsInHalfOpenState=5

# =========================================================
# RABBITMQ
# =========================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# =========================================================
# ELASTICSEARCH
# =========================================================
spring.elasticsearch.uris=http://localhost:9200

