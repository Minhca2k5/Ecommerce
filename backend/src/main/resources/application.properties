spring.application.name=ecommerce

# =========================================================
# DATABASE CONFIGURATION
# =========================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:project}
spring.datasource.password=${DB_PASSWORD:minh123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# SWAGGER CONFIGURATION
# =========================================================
springdoc.swagger-ui.path=/docs

# =========================================================
# LOGGING CONFIGURATION
# =========================================================
# Hiện log màu sắc cho dễ nhìn
spring.output.ansi.enabled=ALWAYS

# Mức độ log cho code của bạn (DEBUG sẽ hiện chi tiết hơn INFO)
logging.level.com.minzetsu.ecommerce=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n


# =========================================================
# JWT CONFIGURATION
# =========================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=864000000
application.security.jwt.refresh-token.expiration=604800000

# =========================================================
# HIBERNATE / JPA CONFIGURATION
# =========================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# LIQUIBASE CONFIGURATION
# =========================================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# =========================================================
# ERROR HANDLING
# =========================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# =========================================================
# ACTUATOR / METRICS
# =========================================================
management.endpoints.web.exposure.include=health,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.endpoint.circuitbreakers.enabled=true
management.health.circuitbreakers.enabled=true

# =========================================================
# CUSTOM APPLICATION PROPERTIES
# =========================================================
days = 60
limit = 20
admin-endpoint = /api/admin
user-endpoint = /api/users/me
public-endpoint = /api/public

# =========================================================
# REDIS / CACHE
# =========================================================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# =========================================================
# RATE LIMITING
# =========================================================
rate-limit.enabled=true
rate-limit.public-rule.capacity=60
rate-limit.public-rule.refill-tokens=60
rate-limit.public-rule.period=60s
rate-limit.auth-rule.capacity=10
rate-limit.auth-rule.refill-tokens=10
rate-limit.auth-rule.period=60s
rate-limit.user-rule.capacity=120
rate-limit.user-rule.refill-tokens=120
rate-limit.user-rule.period=60s
rate-limit.admin-rule.capacity=60
rate-limit.admin-rule.refill-tokens=60
rate-limit.admin-rule.period=60s
rate-limit.allow-k6-user-agent-bypass=false
rate-limit.bucket-ttl=10m
rate-limit.cleanup-interval=5m

# =========================================================
# OUTBOUND HTTP (timeouts + retry)
# =========================================================
outbound.http.connect-timeout-ms=120000
outbound.http.read-timeout-ms=120000
outbound.http.max-attempts=1
outbound.http.backoff-ms=200
outbound.http.backoff-multiplier=2.0
outbound.http.max-backoff-ms=2000
outbound.http.webhook-url=

# =========================================================
# RESILIENCE4J CIRCUIT BREAKER
# =========================================================
resilience4j.circuitbreaker.instances.outboundWebhook.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.outboundWebhook.slidingWindowSize=20
resilience4j.circuitbreaker.instances.outboundWebhook.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.outboundWebhook.failureRateThreshold=50
resilience4j.circuitbreaker.instances.outboundWebhook.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.outboundWebhook.permittedNumberOfCallsInHalfOpenState=5

# =========================================================
# RABBITMQ
# =========================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# =========================================================
# ELASTICSEARCH
# =========================================================
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}

# =========================================================
# MOMO PAYMENT (SANDBOX)
# =========================================================
momo.partner-code=${MOMO_PARTNER_CODE:MOMO}
momo.access-key=${MOMO_ACCESS_KEY:F8BBA842ECF85}
momo.secret-key=${MOMO_SECRET_KEY:K951B6PE1waDMi640xX08PD3vg6EkVlz}
momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn}
momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:5173/orders}
# Update when ngrok URL changes
momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/public/payments/momo/ipn}
momo.request-type=captureWallet
momo.order-info-prefix=Order
momo.extra-data=

# =========================================================
# CHATBOT (LLM HTTP)
# =========================================================
chatbot.enabled=true
chatbot.base-url=${CHATBOT_BASE_URL:http://localhost:11434}
chatbot.api-key=${CHATBOT_API_KEY:}
chatbot.model=${CHATBOT_MODEL:llama3.2:1b}
chatbot.temperature=0.1
chatbot.max-tokens=128
chatbot.num-predict=1280
chatbot.cache-ttl-ms=60000
chatbot.project-root=${user.dir}/..
chatbot.project-search-enabled=true
chatbot.project-max-files=200
chatbot.project-max-file-bytes=120000
chatbot.project-max-snippets=3
chatbot.query-planner-enabled=false
chatbot.default-voice-lang=en

# =========================================================
# CART RESERVATION TTL
# =========================================================
cart.reservation-ttl-minutes=30
cart.reservation-cleanup-interval-ms=60000

# =========================================================
# SERVER ENCODING
# =========================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# =========================================================
# EMAIL (SMTP)
# =========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mastercode2k5@gmail.com}
spring.mail.password=${MAIL_PASSWORD:lkyhfptemwntkrsj}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
logging.level.org.springframework.mail=${MAIL_LOG_LEVEL:INFO}
logging.level.org.springframework.boot.autoconfigure.mail=${MAIL_LOG_LEVEL:INFO}
logging.level.com.sun.mail=${MAIL_LOG_LEVEL:INFO}
logging.level.jakarta.mail=${MAIL_LOG_LEVEL:INFO}
