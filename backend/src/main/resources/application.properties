spring.config.import=optional:file:.env.properties

spring.application.name=ecommerce

# =========================================================
# DATABASE CONFIGURATION
# =========================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# SWAGGER CONFIGURATION
# =========================================================
springdoc.swagger-ui.path=/docs

# =========================================================
# LOGGING CONFIGURATION
# =========================================================
# Enable ANSI colors in logs for better readability in supported terminals
spring.output.ansi.enabled=ALWAYS

# Set logging level for the application package to DEBUG for detailed logs during development
logging.level.com.minzetsu.ecommerce=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n


# =========================================================
# JWT CONFIGURATION
# =========================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=864000000
application.security.jwt.refresh-token.expiration=604800000

# =========================================================
# HIBERNATE / JPA CONFIGURATION
# =========================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# LIQUIBASE CONFIGURATION
# =========================================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# =========================================================
# ERROR HANDLING
# =========================================================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# =========================================================
# ACTUATOR / METRICS
# =========================================================
management.endpoints.web.exposure.include=health,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.endpoint.circuitbreakers.enabled=true
management.health.circuitbreakers.enabled=true

# =========================================================
# CUSTOM APPLICATION PROPERTIES
# =========================================================
days = 60
limit = 20
admin-endpoint = /api/admin
user-endpoint = /api/users/me
public-endpoint = /api/public

# =========================================================
# REDIS / CACHE
# =========================================================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# =========================================================
# RATE LIMITING
# =========================================================
rate-limit.enabled=true
rate-limit.public-rule.capacity=60
rate-limit.public-rule.refill-tokens=60
rate-limit.public-rule.period=60s
rate-limit.auth-rule.capacity=10
rate-limit.auth-rule.refill-tokens=10
rate-limit.auth-rule.period=60s
rate-limit.user-rule.capacity=120
rate-limit.user-rule.refill-tokens=120
rate-limit.user-rule.period=60s
rate-limit.admin-rule.capacity=60
rate-limit.admin-rule.refill-tokens=60
rate-limit.admin-rule.period=60s
rate-limit.allow-k6-user-agent-bypass=false
rate-limit.bucket-ttl=10m
rate-limit.cleanup-interval=5m

# =========================================================
# OUTBOUND HTTP (timeouts + retry)
# =========================================================
outbound.http.connect-timeout-ms=120000
outbound.http.read-timeout-ms=120000
outbound.http.max-attempts=1
outbound.http.backoff-ms=200
outbound.http.backoff-multiplier=2.0
outbound.http.max-backoff-ms=2000
outbound.http.webhook-url=

# =========================================================
# DB TRANSIENT LOCK RETRY (deadlock/serialization)
# =========================================================
db.retry.max-attempts=3
db.retry.backoff-ms=80
db.retry.backoff-multiplier=2.0
db.retry.max-backoff-ms=500

# =========================================================
# RESILIENCE4J CIRCUIT BREAKER
# =========================================================
resilience4j.circuitbreaker.instances.outboundWebhook.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.outboundWebhook.slidingWindowSize=20
resilience4j.circuitbreaker.instances.outboundWebhook.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.outboundWebhook.failureRateThreshold=50
resilience4j.circuitbreaker.instances.outboundWebhook.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.outboundWebhook.permittedNumberOfCallsInHalfOpenState=5

# =========================================================
# RABBITMQ
# =========================================================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# =========================================================
# ELASTICSEARCH
# =========================================================
spring.elasticsearch.uris=${ELASTICSEARCH_URIS}

# =========================================================
# MOMO PAYMENT (SANDBOX)
# =========================================================
momo.partner-code=${MOMO_PARTNER_CODE}
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.endpoint=${MOMO_ENDPOINT}
momo.redirect-url=${MOMO_REDIRECT_URL}
# Update when ngrok URL changes
momo.ipn-url=${MOMO_IPN_URL}
momo.request-type=captureWallet
momo.order-info-prefix=Order
momo.extra-data=

# =========================================================
# CHATBOT (LLM HTTP)
# =========================================================
chatbot.enabled=true
chatbot.base-url=${CHATBOT_BASE_URL}
chatbot.api-key=${CHATBOT_API_KEY}
chatbot.model=${CHATBOT_MODEL}
chatbot.temperature=0.1
chatbot.max-tokens=96
chatbot.num-predict=192
chatbot.cache-ttl-ms=300000
chatbot.project-root=${user.dir}/..
chatbot.project-search-enabled=true
chatbot.project-max-files=50
chatbot.project-max-file-bytes=120000
chatbot.project-max-snippets=1
chatbot.query-planner-enabled=false
chatbot.default-voice-lang=en

# =========================================================
# CART RESERVATION TTL
# =========================================================
cart.reservation-ttl-minutes=30
cart.reservation-cleanup-interval-ms=60000

# =========================================================
# SERVER ENCODING
# =========================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# =========================================================
# EMAIL (SMTP)
# =========================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
logging.level.org.springframework.mail=${MAIL_LOG_LEVEL}
logging.level.org.springframework.boot.autoconfigure.mail=${MAIL_LOG_LEVEL}
logging.level.com.sun.mail=${MAIL_LOG_LEVEL}
logging.level.jakarta.mail=${MAIL_LOG_LEVEL}

# =========================================================
# AUDIT LOG RETENTION
# =========================================================
audit-log.retention.enabled=true
audit-log.retention.retention-days=180
audit-log.retention.cleanup-interval-ms=86400000
audit-log.retention.batch-size=1000
audit-log.telemetry.redis.enabled=true
audit-log.telemetry.redis.channel=audit-log-events

# =========================================================
# GUEST CHECKOUT
# =========================================================
guest-checkout.enabled=true
guest-checkout.username=${GUEST_CHECKOUT_USERNAME}
guest-checkout.email=${GUEST_CHECKOUT_EMAIL}
guest-checkout.password=${GUEST_CHECKOUT_PASSWORD}
guest-checkout.access-token-secret=${GUEST_CHECKOUT_ACCESS_TOKEN_SECRET}
guest-checkout.access-token-ttl-minutes=4320
checkout.abuse.enabled=true
checkout.abuse.max-failures=5
checkout.abuse.window-minutes=10
checkout.pricing.default-currency=VND
checkout.pricing.exchange-rates.VND=1
checkout.pricing.exchange-rates.USD=0.000039
checkout.pricing.exchange-rates.JPY=0.0058
checkout.pricing.tax-rates.VND=0.08
checkout.pricing.tax-rates.USD=0.08
checkout.pricing.tax-rates.JPY=0.10
checkout.pricing.shipping-flat-fees.VND=30000
checkout.pricing.shipping-flat-fees.USD=1.50
checkout.pricing.shipping-flat-fees.JPY=220

# =========================================================
# MONGODB CONFIGURATION
# =========================================================
spring.data.mongodb.uri=mongodb://localhost:27017/ecommerce

# =========================================================
# ANALYTICS ETL (PHASE 6)
# =========================================================
analytics.etl.enabled=true
analytics.etl.daily-cron=0 15 1 * * *
analytics.etl.alert.failure-threshold=3
analytics.etl.alert.stale-days-threshold=2
analytics.realtime.enabled=true
analytics.realtime.ttl-hours=72




