services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_USER: ${MYSQL_USER:-ecommerce}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecommerce}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-ecommerce}", "-p${MYSQL_PASSWORD:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_AMQP_HOST_PORT:-5673}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9201}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  mongodb:
    image: mongo:7
    ports:
      - "${MONGODB_HOST_PORT:-27018}:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_started
      mongodb:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ecommerce}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-ecommerce}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ecommerce}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/ecommerce

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY}
      MOMO_ENDPOINT: ${MOMO_ENDPOINT}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL}
      MOMO_IPN_URL: ${MOMO_IPN_URL}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_LOG_LEVEL: ${MAIL_LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

      CHATBOT_ENABLED: ${CHATBOT_ENABLED:-false}
      CHATBOT_PROVIDER: ${CHATBOT_PROVIDER:-openai-compatible}
      CHATBOT_BASE_URL: ${CHATBOT_BASE_URL}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY}
      CHATBOT_MODEL: ${CHATBOT_MODEL}

      GUEST_CHECKOUT_USERNAME: ${GUEST_CHECKOUT_USERNAME}
      GUEST_CHECKOUT_EMAIL: ${GUEST_CHECKOUT_EMAIL}
      GUEST_CHECKOUT_PASSWORD: ${GUEST_CHECKOUT_PASSWORD}
      GUEST_CHECKOUT_ACCESS_TOKEN_SECRET: ${GUEST_CHECKOUT_ACCESS_TOKEN_SECRET}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_MOMO_SANDBOX_ENABLED: ${VITE_MOMO_SANDBOX_ENABLED:-false}
        VITE_MANUAL_MOMO_ACCOUNT_NAME: ${VITE_MANUAL_MOMO_ACCOUNT_NAME:-}
        VITE_MANUAL_MOMO_ACCOUNT_NUMBER: ${VITE_MANUAL_MOMO_ACCOUNT_NUMBER:-}
    depends_on:
      - backend
    ports:
      - "5173:80"

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      - backend
    command: http backend:8080 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  es_data:
  mongo_data:
